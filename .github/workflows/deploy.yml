name: Deploy Face Recognition AI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Deployment Artifact
        # Kita bungkus semua file kecuali venv, git, dan env lokal
        run: |
          tar -czf /tmp/app.tar.gz --exclude='.git' --exclude='.github' --exclude='venv' --exclude='.env' .
          
          # Pindahkan kembali ke folder project agar bisa di-upload sebagai artifact
          mv /tmp/app.tar.gz
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-python
          path: app.tar.gz

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-python

      - name: Install ssh key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy Process
        run: |
          # Variabel rilis unik
          REL=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}
          APP_DIR="/var/www/face_recognition"
          
          # Upload tarball ke folder releases
          scp -P "${{ secrets.SSH_PORT }}" app.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$APP_DIR/releases/tmp-$REL.tar.gz

          ssh -tt -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            set -e
            cd $APP_DIR/releases
            
            # Ekstrak rilis baru
            mkdir -p \$REL
            tar -xzf tmp-\$REL.tar.gz -C \$REL
            rm tmp-\$REL.tar.gz
            cd \$REL
            
            # --- LINKING SHARED RESOURCES ---
            # Pastikan folder uploads tersedia di shared
            mkdir -p $APP_DIR/shared/uploads
            
            # Link ke .env dan uploads yang ada di shared
            ln -sfn $APP_DIR/shared/.env .env
            ln -sfn $APP_DIR/shared/uploads uploads

            # --- FIX PERMISSIONS ---
            # Set owner ke www-data agar seragam dengan Laravel/Nginx
            sudo chown -R www-data:www-data .
            sudo chown -R www-data:www-data $APP_DIR/shared/uploads
            sudo chmod -R 775 $APP_DIR/shared/uploads
            
            # --- DEPENDENCIES ---
            # Jalankan pip install menggunakan venv yang ada di shared
            # Kita asumsikan venv sudah di-setup di /shared/venv seperti langkah awal kita
            $APP_DIR/shared/venv/bin/pip install --upgrade pip
            $APP_DIR/shared/venv/bin/pip install -r requirements.txt

            # --- AKTIVASI ---
            # Geser symlink 'current' ke folder rilis terbaru
            ln -sfn $APP_DIR/releases/\$REL $APP_DIR/current
            
            # --- RELOAD SERVICE ---
            # Restart systemd agar Python membaca kode terbaru
            echo 'Restarting Python Service...'
            sudo systemctl restart face_recognition
            echo 'Deployment Successful!'
          "